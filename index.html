<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>O Bicho comeu as estrelas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Creepster&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#040106;
    --void2:#0c0208;
    --blood:#8a0f0f;
    --ember:#c9432c;
    --bone:#e9e0d0;
    --star:#f5e6a3;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0; height:100%; width:100%;
    background:var(--void);
    overflow:hidden;
    font-family:'Special Elite', monospace;
    -webkit-tap-highlight-color:transparent;
  }

  #sky{
    position:fixed; inset:0; z-index:1; display:block;
  }

  #fog{
    position:fixed; inset:-10% -10%; z-index:2; pointer-events:none;
    background:
      radial-gradient(ellipse 60% 40% at 20% 80%, rgba(60,10,20,0.25), transparent 60%),
      radial-gradient(ellipse 50% 35% at 80% 70%, rgba(30,5,15,0.25), transparent 60%);
    filter:blur(20px);
    animation:fogdrift 40s ease-in-out infinite alternate;
    mix-blend-mode:screen;
  }
  @keyframes fogdrift{
    0%{ transform:translate(0,0) scale(1); }
    100%{ transform:translate(3%, -2%) scale(1.08); }
  }

  #bites{ position:fixed; inset:0; z-index:3; pointer-events:none; }

  .bite{
    position:absolute;
    background:
      radial-gradient(circle at 50% 50%, #000 42%, rgba(0,0,0,0.9) 68%, rgba(0,0,0,0) 100%);
    box-shadow:
      0 0 26px 8px rgba(201,67,44,0.55),
      0 0 60px 16px rgba(138,15,15,0.25),
      inset 0 0 22px 6px rgba(0,0,0,0.95);
    transform:scale(0);
    opacity:0;
    transition:transform 0.6s cubic-bezier(.2,1.8,.3,1), opacity 0.3s ease;
  }
  .bite.appear{
    opacity:1;
    transform:scale(1);
  }
  .bite .pupil{
    position:absolute; left:50%; top:50%; width:22%; height:22%;
    background:var(--ember);
    border-radius:50%;
    transform:translate(-50%,-50%);
    box-shadow:0 0 10px 3px var(--ember);
    opacity:0.85;
  }
  .bite.breathe{ animation:breathe 4.5s ease-in-out infinite; }
  @keyframes breathe{
    0%,100%{ filter:brightness(1); }
    50%{ filter:brightness(1.35); }
  }
  .bite.blink .pupil{ animation:blink 0.35s ease; }
  @keyframes blink{
    0%,100%{ transform:translate(-50%,-50%) scaleY(1); }
    50%{ transform:translate(-50%,-50%) scaleY(0.05); }
  }
  .bite.flash{ filter:brightness(1.9) saturate(1.3); }

  #vignette{
    position:fixed; inset:0; z-index:4; pointer-events:none;
    background:radial-gradient(ellipse at 50% 50%, transparent 40%, rgba(0,0,0,0.55) 78%, rgba(0,0,0,0.92) 100%);
  }

  #flash{
    position:fixed; inset:0; z-index:6; pointer-events:none;
    background:rgba(120,10,10,0.0);
    transition:background 0.5s ease;
  }
  #flash.on{ background:rgba(120,10,10,0.38); }

  #start-overlay{
    position:fixed; inset:0; z-index:20;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:28px;
    background:rgba(2,1,4,0.6);
    text-align:center;
    padding:24px;
    transition:opacity 1s ease;
  }
  #start-overlay.hide{ opacity:0; pointer-events:none; }
  #start-overlay p{
    color:var(--bone);
    font-size:1.1rem;
    letter-spacing:0.03em;
    text-shadow:0 0 12px rgba(0,0,0,0.9);
    max-width:26em;
    line-height:1.7;
    margin:0;
    opacity:0.85;
  }
  #start-btn{
    font-family:'Special Elite', monospace;
    background:transparent;
    color:var(--ember);
    border:1px solid var(--blood);
    padding:14px 26px;
    font-size:1rem;
    letter-spacing:0.08em;
    cursor:pointer;
    border-radius:2px;
    box-shadow:0 0 18px rgba(138,15,15,0.35);
    transition:all 0.3s ease;
  }
  #start-btn:hover{
    background:rgba(138,15,15,0.15);
    box-shadow:0 0 28px rgba(201,67,44,0.55);
    color:var(--bone);
  }

  #message{
    position:fixed; inset:0; z-index:5;
    display:flex; align-items:center; justify-content:center;
    opacity:0;
    transition:opacity 2.5s ease;
    pointer-events:none;
    padding:20px;
  }
  #message.show{ opacity:1; }

  #message h1{
    font-family:'Creepster', cursive;
    color:var(--bone);
    font-size:clamp(1.8rem, 6vw, 4rem);
    text-align:center;
    line-height:1.35;
    margin:0;
    letter-spacing:0.02em;
    position:relative;
    text-shadow:
      0 0 12px rgba(201,67,44,0.65),
      0 0 30px rgba(138,15,15,0.5);
  }
  #message h1::before,
  #message h1::after{
    content:attr(data-text);
    position:absolute; left:0; top:0; width:100%; height:100%;
    white-space:pre-line;
  }
  #message.glitch h1::before{
    color:#4fd8e0;
    mix-blend-mode:screen;
    animation:glitch1 3.2s infinite linear;
  }
  #message.glitch h1::after{
    color:var(--blood);
    mix-blend-mode:screen;
    animation:glitch2 2.6s infinite linear;
  }
  @keyframes glitch1{
    0%,89%,100%{ clip-path:inset(0 0 0 0); transform:translate(0,0); opacity:0; }
    90%{ clip-path:inset(10% 0 60% 0); transform:translate(-3px,1px); opacity:0.7; }
    92%{ clip-path:inset(60% 0 5% 0); transform:translate(3px,-1px); opacity:0.7; }
    94%{ clip-path:inset(30% 0 40% 0); transform:translate(-2px,2px); opacity:0.5; }
    96%{ opacity:0; }
  }
  @keyframes glitch2{
    0%,84%,100%{ clip-path:inset(0 0 0 0); transform:translate(0,0); opacity:0; }
    85%{ clip-path:inset(70% 0 5% 0); transform:translate(2px,-2px); opacity:0.6; }
    87%{ clip-path:inset(5% 0 70% 0); transform:translate(-3px,1px); opacity:0.6; }
    89%{ opacity:0; }
  }
  #message.glitch h1{ animation:flicker 6s infinite; }
  @keyframes flicker{
    0%,93%,100%{ opacity:1; }
    93.5%{ opacity:0.4; }
    94%{ opacity:1; }
    95%{ opacity:0.15; }
    95.5%{ opacity:1; }
  }

  .drip{
    position:absolute;
    top:100%;
    width:3px;
    background:linear-gradient(to bottom, var(--blood), transparent);
    border-radius:0 0 3px 3px;
    animation:dripgrow 4s ease-in forwards;
  }
  @keyframes dripgrow{
    0%{ height:0; opacity:0.9; }
    100%{ opacity:0.6; }
  }

  #mute-btn{
    position:fixed; right:16px; bottom:16px; z-index:30;
    background:rgba(4,1,6,0.6);
    border:1px solid rgba(233,224,208,0.25);
    color:var(--bone);
    font-size:1.2rem;
    width:44px; height:44px;
    border-radius:50%;
    cursor:pointer;
    opacity:0;
    transition:opacity 1s ease;
  }
  #mute-btn.show{ opacity:0.75; }
  #mute-btn:hover{ opacity:1; }

  body.shake{ animation:shake 0.4s ease; }
  @keyframes shake{
    0%,100%{ transform:translate(0,0); }
    20%{ transform:translate(-6px,3px); }
    40%{ transform:translate(5px,-4px); }
    60%{ transform:translate(-4px,-2px); }
    80%{ transform:translate(6px,2px); }
  }

  @media (prefers-reduced-motion: reduce){
    #fog{ animation:none; }
    .bite.breathe{ animation:none; }
    #message.glitch h1::before,
    #message.glitch h1::after{ animation:none; display:none; }
    #message.glitch h1{ animation:none; }
    body.shake{ animation:none; }
  }
</style>
</head>
<body>

  <canvas id="sky"></canvas>
  <div id="fog"></div>
  <div id="bites"></div>
  <div id="vignette"></div>
  <div id="flash"></div>

  <div id="message">
    <h1 data-text="Desculpe crianças,&#10;eu sou o Bicho&#10;e comi suas estrelas.">Desculpe crianças,<br>eu sou o Bicho<br>e comi suas estrelas.</h1>
  </div>

  <div id="start-overlay">
    <p>As estrelas ainda estão no céu.<br>Por enquanto.</p>
    <button id="start-btn">toque para olhar para cima</button>
  </div>

  <button id="mute-btn" aria-label="som">🔊</button>

<script>
(function(){
  "use strict";

  const canvas = document.getElementById('sky');
  const ctx = canvas.getContext('2d');
  const bitesLayer = document.getElementById('bites');
  const messageEl = document.getElementById('message');
  const startOverlay = document.getElementById('start-overlay');
  const startBtn = document.getElementById('start-btn');
  const muteBtn = document.getElementById('mute-btn');
  const flashEl = document.getElementById('flash');

  let stars = [];
  let biteElements = [];

  function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function initStars(){
    stars = [];
    const count = Math.max(60, Math.floor((canvas.width * canvas.height) / 8500));
    for(let i=0;i<count;i++){
      stars.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height*0.85,
        r: Math.random()*1.5+0.4,
        phase: Math.random()*Math.PI*2,
        speed: 0.5+Math.random()*1.3,
        alive:true,
        eaten:false,
        t:0, tx:0, ty:0
      });
    }
  }

  resize();
  initStars();
  window.addEventListener('resize', ()=>{ resize(); });

  function draw(time){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(const s of stars){
      if(!s.alive) continue;
      if(s.eaten){
        s.t += 0.045;
        if(s.t>=1){ s.alive=false; continue; }
        const ease = 1-Math.pow(1-s.t,2);
        const cx = s.x + (s.tx-s.x)*ease;
        const cy = s.y + (s.ty-s.y)*ease;
        const alpha = 1-ease;
        const r = Math.max(s.r*(1-ease), 0);
        ctx.beginPath();
        ctx.fillStyle = `rgba(245,230,163,${alpha})`;
        ctx.arc(cx,cy,r,0,Math.PI*2);
        ctx.fill();
        continue;
      }
      const twinkle = 0.5+0.5*Math.sin(time*0.001*s.speed + s.phase);
      ctx.beginPath();
      ctx.fillStyle = `rgba(245,230,163,${0.25+0.7*twinkle})`;
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);

  function randomBlob(){
    const a = 40+Math.random()*20, b = 60-Math.random()*20;
    const c = 45+Math.random()*15, d = 55-Math.random()*15;
    return `${a}% ${100-a}% ${b}% ${100-b}% / ${c}% ${d}% ${100-d}% ${100-c}%`;
  }

  function createBite(x, y, size){
    const el = document.createElement('div');
    el.className = 'bite';
    const dim = Math.min(160, Math.max(46, size*22));
    el.style.width = dim+'px';
    el.style.height = dim+'px';
    el.style.left = (x - dim/2)+'px';
    el.style.top = (y - dim/2)+'px';
    el.style.borderRadius = randomBlob();
    const pupil = document.createElement('div');
    pupil.className = 'pupil';
    el.appendChild(pupil);
    bitesLayer.appendChild(el);
    biteElements.push(el);
    requestAnimationFrame(()=>{
      el.classList.add('appear');
      setTimeout(()=> el.classList.add('breathe'), 650);
    });
  }

  function shakeScreen(){
    document.body.classList.remove('shake');
    void document.body.offsetWidth;
    document.body.classList.add('shake');
  }

  // ---------- audio (fully synthesized, no external files) ----------
  let audioCtx=null, masterGain=null, droneGain=null, savedVolume=0.5, muted=false;

  function initAudio(){
    if(audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = savedVolume;
    masterGain.connect(audioCtx.destination);

    // low drone
    const osc1 = audioCtx.createOscillator();
    osc1.type='sine'; osc1.frequency.value=54;
    droneGain = audioCtx.createGain();
    droneGain.gain.value = 0.0001;
    osc1.connect(droneGain).connect(masterGain);
    osc1.start();
    droneGain.gain.exponentialRampToValueAtTime(0.06, audioCtx.currentTime+3);

    // slow LFO pulsing the drone
    const lfo = audioCtx.createOscillator();
    lfo.type='sine'; lfo.frequency.value=0.12;
    const lfoGain = audioCtx.createGain();
    lfoGain.gain.value = 0.025;
    lfo.connect(lfoGain).connect(droneGain.gain);
    lfo.start();

    // faint high unease tone
    const osc2 = audioCtx.createOscillator();
    osc2.type='sawtooth'; osc2.frequency.value=210;
    const g2 = audioCtx.createGain();
    g2.gain.value=0.0;
    osc2.connect(g2).connect(masterGain);
    osc2.start();
    g2.gain.exponentialRampToValueAtTime(0.006, audioCtx.currentTime+4);

    muteBtn.classList.add('show');
  }

  function noiseBuffer(duration){
    const rate = audioCtx.sampleRate;
    const len = Math.floor(rate*duration);
    const buf = audioCtx.createBuffer(1, len, rate);
    const data = buf.getChannelData(0);
    for(let i=0;i<len;i++){ data[i]=Math.random()*2-1; }
    return buf;
  }

  function playChomp(){
    if(!audioCtx) return;
    const src = audioCtx.createBufferSource();
    src.buffer = noiseBuffer(0.22);
    const filter = audioCtx.createBiquadFilter();
    filter.type='lowpass'; filter.frequency.value=320;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.5, audioCtx.currentTime+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+0.22);
    src.connect(filter).connect(g).connect(masterGain);
    src.start();
  }

  function playGrowl(){
    if(!audioCtx) return;
    const src = audioCtx.createBufferSource();
    src.buffer = noiseBuffer(0.7);
    const filter = audioCtx.createBiquadFilter();
    filter.type='lowpass'; filter.frequency.setValueAtTime(500, audioCtx.currentTime);
    filter.frequency.exponentialRampToValueAtTime(90, audioCtx.currentTime+0.65);
    filter.Q.value=8;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.55, audioCtx.currentTime+0.08);
    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+0.7);
    src.connect(filter).connect(g).connect(masterGain);
    src.start();
  }

  muteBtn.addEventListener('click', ()=>{
    if(!audioCtx) return;
    muted = !muted;
    masterGain.gain.setTargetAtTime(muted?0:savedVolume, audioCtx.currentTime, 0.05);
    muteBtn.textContent = muted ? '🔇' : '🔊';
  });

  // ---------- sequence ----------
  function startEating(){
    const totalBites = 7;
    let biteIndex = 0;

    function nextBite(){
      const alive = stars.filter(s=>s.alive && !s.eaten);
      biteIndex++;
      if(biteIndex>totalBites || alive.length===0){
        finishEating();
        return;
      }
      const target = {
        x: canvas.width*0.15 + Math.random()*canvas.width*0.7,
        y: canvas.height*0.1 + Math.random()*canvas.height*0.55
      };
      const remainingRounds = Math.max(1, totalBites-biteIndex+1);
      const batchSize = Math.min(alive.length, Math.ceil(alive.length/remainingRounds));
      const shuffled = alive.sort(()=>Math.random()-0.5).slice(0, batchSize);
      shuffled.forEach(s=>{ s.eaten=true; s.t=0; s.tx=target.x; s.ty=target.y; });

      setTimeout(()=>{
        createBite(target.x, target.y, batchSize);
        playChomp();
        shakeScreen();
      }, 550);

      setTimeout(nextBite, 1050+Math.random()*450);
    }
    setTimeout(nextBite, 2000);
  }

  function finishEating(){
    setTimeout(()=>{
      messageEl.classList.add('show');
      setTimeout(()=> messageEl.classList.add('glitch'), 900);
      addDrips();
      if(droneGain){
        droneGain.gain.exponentialRampToValueAtTime(0.1, audioCtx.currentTime+2);
      }
      scheduleJumpScares();
    }, 900);
  }

  function addDrips(){
    const h1 = messageEl.querySelector('h1');
    for(let i=0;i<6;i++){
      const d = document.createElement('span');
      d.className = 'drip';
      d.style.left = (10+Math.random()*80)+'%';
      d.style.height = (10+Math.random()*40)+'px';
      d.style.animationDelay = (1.5+Math.random()*2)+'s';
      h1.appendChild(d);
    }
  }

  function scheduleJumpScares(){
    const delay = 6000+Math.random()*9000;
    setTimeout(()=>{
      if(biteElements.length>0){
        const el = biteElements[Math.floor(Math.random()*biteElements.length)];
        el.classList.add('flash','blink');
        setTimeout(()=> el.classList.remove('flash','blink'), 500);
      }
      shakeScreen();
      playGrowl();
      flashEl.classList.add('on');
      setTimeout(()=> flashEl.classList.remove('on'), 450);
      scheduleJumpScares();
    }, delay);
  }

  startBtn.addEventListener('click', ()=>{
    startOverlay.classList.add('hide');
    initAudio();
    startEating();
  }, {once:true});

})();
</script>
</body>
</html>
