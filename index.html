<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌟 Quadro das Estrelas da Família</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@500;700;800&family=Nunito:wght@600;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#4A3728;
    --card:#FFFFFF;
    --gold:#FFC63D;
    --good:#3FBF7F;
    --bad:#F26D6D;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{overflow-x:hidden;}
  body{
    font-family:'Nunito',sans-serif;
    color:var(--ink);
    padding:20px 16px 90px;
    min-height:100vh;
    background:linear-gradient(180deg,#AEE7FF 0%,#D8F3FF 34%,#FFF3D2 78%,#FFE2BE 100%);
    background-attachment:fixed;
    position:relative;
    transition:background 1s;
  }
  /* ---------- MODO NOITE (depois das 18h) ---------- */
  body.noite{
    background:linear-gradient(180deg,#1B1F4B 0%,#2B2C6B 40%,#4A3B8C 75%,#6B4A9E 100%);
    background-attachment:fixed;
  }
  body.noite h1{color:#FFF3C9;text-shadow:0 3px 0 #2B2C6B,0 6px 0 rgba(0,0,0,.3);}
  body.noite footer{color:#FFF3C9;opacity:.8;}
  body.noite .cloud{opacity:.25;filter:brightness(.6);}
  body.noite .twinkle{opacity:.9;}
  .ar{font-family:'Baloo Bhaijaan 2',cursive;}

  /* ---------- CÉU ---------- */
  .sky{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
  .sun{
    position:absolute;top:26px;right:34px;width:92px;height:92px;
    background:radial-gradient(circle,#FFE873 55%,#FFD23F 100%);
    border-radius:50%;
    box-shadow:0 0 46px 14px rgba(255,210,63,.55);
  }
  .sun::before{
    content:"";position:absolute;inset:-26px;border-radius:50%;
    background:repeating-conic-gradient(rgba(255,210,63,.5) 0 8deg,transparent 8deg 24deg);
    animation:raysSpin 24s linear infinite;
  }
  .moon{
    position:absolute;top:26px;right:34px;width:88px;height:88px;
    background:radial-gradient(circle at 38% 34%,#FFFDF2 55%,#F2E8C9 100%);
    border-radius:50%;
    box-shadow:0 0 42px 12px rgba(255,250,220,.45);
    animation:moonSway 7s ease-in-out infinite;
  }
  .moon::before{content:"";position:absolute;left:18px;top:24px;width:16px;height:16px;border-radius:50%;background:rgba(190,180,150,.4);}
  .moon::after{content:"";position:absolute;right:20px;bottom:18px;width:11px;height:11px;border-radius:50%;background:rgba(190,180,150,.35);}
  @keyframes moonSway{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}
  @keyframes raysSpin{to{transform:rotate(360deg)}}
  .cloud{
    position:absolute;font-size:64px;opacity:.9;
    filter:drop-shadow(0 6px 4px rgba(90,140,180,.15));
    animation:driftby linear infinite;
  }
  @keyframes driftby{from{transform:translateX(-160px)}to{transform:translateX(110vw)}}
  .twinkle{position:absolute;font-size:20px;opacity:.55;animation:twk ease-in-out infinite;}
  @keyframes twk{
    0%,100%{opacity:.15;transform:scale(.8) rotate(0deg)}
    50%{opacity:.9;transform:scale(1.25) rotate(20deg)}
  }
  .balloon{position:absolute;bottom:-90px;font-size:44px;opacity:.8;animation:rise linear infinite;}
  .firefly{position:absolute;font-size:15px;animation:fly ease-in-out infinite;}
  @keyframes fly{
    0%,100%{transform:translate(0,0);opacity:.2}
    25%{transform:translate(26px,-32px);opacity:1}
    50%{transform:translate(-16px,-56px);opacity:.4}
    75%{transform:translate(20px,-24px);opacity:.95}
  }
  @keyframes rise{from{transform:translateY(0) rotate(-6deg)}to{transform:translateY(-120vh) rotate(8deg)}}
  .shooting{
    position:absolute;font-size:22px;opacity:0;
    animation:shoot 7s ease-in infinite;
  }
  @keyframes shoot{
    0%,88%{opacity:0;transform:translate(0,0) rotate(-30deg)}
    90%{opacity:1}
    100%{opacity:0;transform:translate(-45vw,38vh) rotate(-30deg)}
  }

  /* ---------- CABEÇALHO ---------- */
  header{text-align:center;position:relative;z-index:2;margin-bottom:10px;}
  h1{
    font-family:'Baloo Bhaijaan 2',cursive;
    font-size:clamp(32px,5.8vw,56px);
    font-weight:800;letter-spacing:.5px;
    color:#3B2B60;
    text-shadow:0 3px 0 #fff,0 6px 0 rgba(59,43,96,.12);
    transition:color 1s;
  }
  h1 .spark{display:inline-block;animation:sparkDance 2.4s ease-in-out infinite;}
  h1 .spark:last-child{animation-delay:1.2s;}
  @keyframes sparkDance{0%,100%{transform:rotate(-12deg) scale(1)}50%{transform:rotate(12deg) scale(1.25)}}
  .frase{
    font-size:clamp(16px,2.6vw,22px);
    font-weight:900;background:#fff;display:inline-block;
    padding:10px 26px;border-radius:999px;border:3px solid #FFD23F;
    box-shadow:0 5px 0 rgba(74,55,40,.14);margin-top:10px;
    animation:frasePop .8s cubic-bezier(.2,1.6,.4,1) both .3s;
  }
  @keyframes frasePop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}

  /* ---------- GRID E CARTÕES ---------- */
  .grid{
    position:relative;z-index:2;display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:22px;max-width:1200px;margin:28px auto 0;
  }
  .card{
    background:var(--card);border-radius:30px;padding:24px 22px 18px;
    border:4px solid color-mix(in srgb,var(--kid) 55%,#fff);
    border-top:12px solid var(--kid);
    box-shadow:0 10px 0 color-mix(in srgb,var(--kid) 30%,transparent);
    position:relative;opacity:0;
    animation:cardPop .7s cubic-bezier(.2,1.5,.4,1) forwards;
    animation-delay:var(--delay);
  }
  @keyframes cardPop{
    from{opacity:0;transform:translateY(50px) scale(.7) rotate(-3deg)}
    to{opacity:1;transform:translateY(0) scale(1) rotate(0)}
  }
  .card.leader{
    border-color:var(--gold);
    box-shadow:0 10px 0 rgba(255,198,61,.5),0 0 34px rgba(255,198,61,.55);
  }
  .card.leader::after{
    content:"";position:absolute;inset:-4px;border-radius:30px;pointer-events:none;
    animation:glowPulse 2s ease-in-out infinite;
  }
  @keyframes glowPulse{
    0%,100%{box-shadow:0 0 12px 2px rgba(255,198,61,.35)}
    50%{box-shadow:0 0 26px 8px rgba(255,198,61,.65)}
  }
  .crown{
    position:absolute;top:-40px;left:50%;transform:translateX(-50%);
    font-size:48px;filter:drop-shadow(0 3px 2px rgba(0,0,0,.18));
    animation:crownBounce 1.6s ease-in-out infinite;z-index:3;
  }
  .crown::before,.crown::after{content:"✨";position:absolute;font-size:20px;animation:twk 1.8s ease-in-out infinite;}
  .crown::before{left:-22px;top:6px;}
  .crown::after{right:-22px;top:6px;animation-delay:.9s;}
  @keyframes crownBounce{
    0%,100%{transform:translateX(-50%) translateY(0) rotate(-4deg)}
    50%{transform:translateX(-50%) translateY(-10px) rotate(4deg)}
  }
  .rank-badge{
    position:absolute;top:14px;right:16px;font-weight:900;font-size:15px;color:#fff;
    background:var(--kid);padding:5px 14px;border-radius:999px;
    box-shadow:0 3px 0 rgba(0,0,0,.12);transform:rotate(3deg);
  }
  .kid-top{display:flex;align-items:center;gap:14px;}
  .avatar{
    font-size:54px;width:84px;height:84px;flex:0 0 84px;
    display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at 35% 30%,#fff 0%,color-mix(in srgb,var(--kid) 26%,#fff) 100%);
    border:3px solid var(--kid);border-radius:50%;
    cursor:pointer;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;
    animation:avatarSway 3.4s ease-in-out infinite;
    transition:transform .15s;position:relative;z-index:2;
  }
  .avatar:active{transform:scale(.9);}
  .avatar.jump{animation:avatarJump .6s cubic-bezier(.2,1.6,.4,1);}
  @keyframes avatarSway{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}
  @keyframes avatarJump{
    0%{transform:translateY(0) scale(1)}
    40%{transform:translateY(-22px) scale(1.15) rotate(8deg)}
    100%{transform:translateY(0) scale(1)}
  }
  .burst{
    position:absolute;left:50%;top:50%;font-size:20px;pointer-events:none;z-index:5;
    animation:burstFly .9s ease-out forwards;
  }
  @keyframes burstFly{
    from{transform:translate(-50%,-50%) scale(.5);opacity:1}
    to{transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(1.3) rotate(var(--rot));opacity:0}
  }
  .nome{font-family:'Baloo Bhaijaan 2',cursive;font-size:29px;font-weight:800;line-height:1.05;}
  .nome-ar{font-size:25px;font-weight:700;color:var(--kid);}
  .idade{font-size:13px;font-weight:900;opacity:.55;}

  .pontos{display:flex;align-items:baseline;gap:8px;margin:14px 0 2px;}
  .pontos .num{
    font-family:'Baloo Bhaijaan 2',cursive;font-size:50px;font-weight:800;
    color:var(--kid);line-height:1;
    text-shadow:0 3px 0 color-mix(in srgb,var(--kid) 25%,#fff);
  }
  .pontos .lbl{font-weight:900;font-size:15px;opacity:.6;}

  .mini-stars{font-size:19px;letter-spacing:2px;margin-bottom:6px;}
  .mini-stars .off{filter:grayscale(1);opacity:.28;}
  .mini-stars .on{
    display:inline-block;
    animation:starPopIn .5s cubic-bezier(.2,1.8,.4,1) both;
    animation-delay:calc(var(--i) * .09s + .6s);
  }
  @keyframes starPopIn{from{transform:scale(0) rotate(-90deg)}to{transform:scale(1) rotate(0)}}

  .animo{
    font-size:14px;font-weight:900;color:var(--kid);
    margin-bottom:6px;
    animation:animoIn .6s ease both 1s;
  }
  @keyframes animoIn{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:none}}

  .meta{font-size:14px;font-weight:900;margin-top:4px;display:flex;justify-content:space-between;align-items:center;}
  .bar-wrap{display:flex;align-items:center;gap:8px;margin-top:6px;}
  .bar{
    flex:1;height:26px;background:#F1E9DC;border-radius:999px;
    position:relative;overflow:visible;
    box-shadow:inset 0 3px 5px rgba(74,55,40,.14);
  }
  .fill{
    height:100%;border-radius:999px;position:relative;overflow:hidden;
    background:repeating-linear-gradient(45deg,var(--kid),var(--kid) 12px,color-mix(in srgb,var(--kid) 70%,#fff) 12px,color-mix(in srgb,var(--kid) 70%,#fff) 24px);
    width:0;transition:width 1.4s cubic-bezier(.2,.8,.2,1);
  }
  .fill::after{
    content:"";position:absolute;inset:0;
    background:linear-gradient(100deg,transparent 30%,rgba(255,255,255,.6) 50%,transparent 70%);
    background-size:200% 100%;animation:shine 2.4s linear infinite;
  }
  @keyframes shine{from{background-position:200% 0}to{background-position:-200% 0}}
  .rocket{
    position:absolute;top:50%;font-size:26px;
    transform:translate(-55%,-56%);left:0;
    transition:left 1.4s cubic-bezier(.2,.8,.2,1);
    filter:drop-shadow(0 2px 1px rgba(0,0,0,.2));z-index:2;
  }
  .finish{font-size:24px;flex:0 0 auto;animation:finishWave 2.2s ease-in-out infinite;}
  @keyframes finishWave{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}}
  .premio-ok{
    margin-top:12px;text-align:center;font-weight:900;font-size:17px;
    background:linear-gradient(90deg,#FFF3C9,#FFE9A3,#FFF3C9);
    background-size:200% 100%;
    border:3px dashed var(--gold);border-radius:16px;padding:10px;
    animation:pulse 1.5s ease-in-out infinite, shimmerBg 3s linear infinite;
  }
  @keyframes pulse{0%,100%{transform:scale(1) rotate(0)}50%{transform:scale(1.04) rotate(.6deg)}}
  @keyframes shimmerBg{from{background-position:0 0}to{background-position:200% 0}}

  .acoes{margin-top:14px;border-top:3px dashed #EDE3D2;padding-top:10px;}
  .acoes h3{font-size:13px;font-weight:900;text-transform:uppercase;letter-spacing:1px;opacity:.5;margin-bottom:6px;}
  .acao{
    display:flex;justify-content:space-between;gap:10px;
    font-size:15px;font-weight:800;padding:6px 10px;border-radius:12px;margin-bottom:4px;
  }
  .acao.mais{background:#EAF9F1;}
  .acao.menos{background:#FDECEC;}
  .acao .pts{font-weight:900;white-space:nowrap;}
  .acao.mais .pts{color:var(--good);}
  .acao.menos .pts{color:var(--bad);}

  footer{
    position:relative;z-index:2;text-align:center;margin-top:30px;
    font-weight:900;font-size:15px;opacity:.65;transition:color 1s;
  }
  .erro{
    position:relative;z-index:2;max-width:600px;margin:40px auto;text-align:center;
    background:#fff;border-radius:20px;padding:24px;font-weight:900;
    border:3px dashed var(--bad);
  }
  #confetti{position:fixed;inset:0;pointer-events:none;z-index:50;}

  /* ---------- MASCOTE ESTRELINHA ---------- */
  .mascote{
    position:fixed;left:14px;bottom:12px;z-index:40;
    display:flex;align-items:flex-end;gap:8px;
    cursor:pointer;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;
  }
  .mascote .corpo{
    font-size:56px;
    animation:mascBounce 2s ease-in-out infinite;
    filter:drop-shadow(0 4px 3px rgba(0,0,0,.2));
  }
  .mascote.pulou .corpo{animation:mascJump .6s cubic-bezier(.2,1.7,.4,1);}
  @keyframes mascBounce{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-8px) rotate(5deg)}}
  @keyframes mascJump{0%{transform:translateY(0) scale(1)}40%{transform:translateY(-30px) scale(1.2) rotate(15deg)}100%{transform:translateY(0) scale(1)}}
  .balao-fala{
    background:#fff;border:3px solid #FFD23F;border-radius:18px 18px 18px 4px;
    padding:8px 14px;font-weight:900;font-size:14px;max-width:230px;
    box-shadow:0 4px 0 rgba(74,55,40,.14);
    margin-bottom:34px;
    animation:falaPop .5s cubic-bezier(.2,1.6,.4,1) both;
  }
  @keyframes falaPop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}

  /* ---------- TOAST "VOCÊ É INCRÍVEL" ---------- */
  .toast{
    position:fixed;top:38%;left:50%;transform:translate(-50%,-50%) scale(0);
    z-index:60;pointer-events:none;
    font-family:'Baloo Bhaijaan 2',cursive;font-weight:800;
    font-size:clamp(26px,5vw,44px);text-align:center;
    background:linear-gradient(90deg,#FF5D8F,#FFB03A,#3FBF7F,#5CC8FF,#9B6BFF);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    padding:18px 30px;
    filter:drop-shadow(0 3px 0 #fff);
    animation:toastIn 2.6s cubic-bezier(.2,1.4,.4,1) forwards;
  }
  @keyframes toastIn{
    0%{transform:translate(-50%,-50%) scale(0) rotate(-8deg)}
    18%{transform:translate(-50%,-50%) scale(1.15) rotate(2deg)}
    28%{transform:translate(-50%,-50%) scale(1) rotate(0)}
    80%{opacity:1;transform:translate(-50%,-50%) scale(1)}
    100%{opacity:0;transform:translate(-50%,-62%) scale(1.05)}
  }

  @media (prefers-reduced-motion:reduce){
    *,*::before,*::after{animation:none !important;transition:none !important;}
    .card{opacity:1;}
    #confetti{display:none;}
  }
</style>
</head>
<body>

<div class="sky" id="sky"></div>

<header>
  <h1><span class="spark">🌟</span> Quadro das Estrelas <span class="spark">🌟</span></h1>
  <div class="frase" id="fraseDia"></div>
</header>

<div class="grid" id="grid"></div>

<footer id="rodape"></footer>

<div class="mascote" id="mascote">
  <span class="corpo">🌟</span>
  <div class="balao-fala" id="falaMascote">Oi! Eu sou a Estrelinha! ✨</div>
</div>

<canvas id="confetti"></canvas>

<script>
/* ============================================================
   ⚙️ NÃO PRECISA MEXER NESTE ARQUIVO NUNCA MAIS.
   Todos os dados vêm do arquivo dados.js (na mesma pasta).
   ============================================================ */

const medalhas = ["🥇 1º lugar", "🥈 2º lugar", "🥉 3º lugar", "⭐ 4º lugar"];
const reduzMovimento = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
const eNoite = (h => h >= 18 || h < 6)(new Date().getHours());

/* ---------- SONS FOFOS (WebAudio, sem arquivos) ---------- */
let audioCtx = null;
function tocar(tipo){
  try{
    audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)();
    const t = audioCtx.currentTime;
    if(tipo === "pop"){
      const o=audioCtx.createOscillator(), g=audioCtx.createGain();
      o.type="sine";
      o.frequency.setValueAtTime(420,t);
      o.frequency.exponentialRampToValueAtTime(880,t+.12);
      g.gain.setValueAtTime(.25,t);
      g.gain.exponentialRampToValueAtTime(.001,t+.22);
      o.connect(g).connect(audioCtx.destination);
      o.start(t); o.stop(t+.25);
    } else if(tipo === "festa"){
      [523,659,784,1047].forEach((f,i)=>{
        const o=audioCtx.createOscillator(), g=audioCtx.createGain();
        o.type="triangle"; o.frequency.value=f;
        const ti=t+i*.11;
        g.gain.setValueAtTime(.001,ti);
        g.gain.exponentialRampToValueAtTime(.22,ti+.02);
        g.gain.exponentialRampToValueAtTime(.001,ti+.4);
        o.connect(g).connect(audioCtx.destination);
        o.start(ti); o.stop(ti+.45);
      });
    }
  }catch(e){/* sem som, sem problema */}
}

/* ---------- CÉU: dia ou noite ---------- */
function montarCeu(){
  const sky = document.getElementById("sky");
  const astro = document.createElement("div");
  astro.className = eNoite ? "moon" : "sun";
  sky.appendChild(astro);
  if(eNoite) document.body.classList.add("noite");

  for(let i=0;i<(eNoite?2:4);i++){
    const c=document.createElement("div");
    c.className="cloud"; c.textContent="☁️";
    c.style.top=(4+Math.random()*26)+"vh";
    c.style.fontSize=(46+Math.random()*40)+"px";
    c.style.animationDuration=(50+Math.random()*50)+"s";
    c.style.animationDelay=(-Math.random()*60)+"s";
    sky.appendChild(c);
  }
  const es=["⭐","✨","🌟","💫"];
  const qtd = eNoite ? 30 : 16;
  for(let i=0;i<qtd;i++){
    const s=document.createElement("div");
    s.className="twinkle"; s.textContent=es[i%es.length];
    s.style.left=Math.random()*96+"vw";
    s.style.top=Math.random()*92+"vh";
    s.style.fontSize=(13+Math.random()*16)+"px";
    s.style.animationDuration=(2+Math.random()*3)+"s";
    s.style.animationDelay=(Math.random()*3)+"s";
    sky.appendChild(s);
  }
  if(eNoite){
    for(let i=0;i<7;i++){
      const f=document.createElement("div");
      f.className="firefly"; f.textContent="🟡";
      f.style.left=Math.random()*94+"vw";
      f.style.top=(40+Math.random()*55)+"vh";
      f.style.fontSize=(7+Math.random()*7)+"px";
      f.style.animationDuration=(5+Math.random()*6)+"s";
      f.style.animationDelay=(Math.random()*5)+"s";
      sky.appendChild(f);
    }
    const met=document.createElement("div");
    met.className="shooting"; met.textContent="🌠";
    met.style.right="10vw"; met.style.top="8vh";
    sky.appendChild(met);
  } else {
    const bs=["🎈","🎈","🪁"];
    for(let i=0;i<3;i++){
      const b=document.createElement("div");
      b.className="balloon"; b.textContent=bs[i];
      b.style.left=(8+Math.random()*84)+"vw";
      b.style.animationDuration=(26+Math.random()*20)+"s";
      b.style.animationDelay=(i*9)+"s";
      sky.appendChild(b);
    }
  }
}

/* ---------- MASCOTE ESTRELINHA ---------- */
const frasesMascote = [
  "Boas ações valem ouro! 💛",
  "Quem vai ganhar a coroa hoje? 👑",
  "Obedecer papai e mamãe dá estrela! ⭐",
  "Vocês são incríveis! 🎉",
  "Ajudar o irmãozinho vale muito! 🤗",
  "Toque no seu bichinho! 👆",
  "Estou de olho nas boas ações! 👀",
  "Falar a verdade brilha muito! ✨"
];
const frasesNoite = [
  "Boa noite, estrelinhas! 🌙",
  "Amanhã tem mais estrelas! ⭐",
  "Quem foi bonzinho dorme feliz! 😴",
  "Sonhem com chocolates! 🍫"
];
function ligarMascote(){
  const m=document.getElementById("mascote");
  const fala=document.getElementById("falaMascote");
  const banco = eNoite ? [...frasesNoite,...frasesMascote] : frasesMascote;
  let idx=0;
  function proximaFala(){
    idx=(idx+1)%banco.length;
    fala.style.animation="none"; void fala.offsetWidth;
    fala.style.animation="";
    fala.textContent=banco[idx];
  }
  setInterval(proximaFala, 9000);
  m.addEventListener("click", ()=>{
    m.classList.remove("pulou"); void m.offsetWidth; m.classList.add("pulou");
    tocar("pop");
    proximaFala();
  });
}

/* ---------- Toque no avatar: pulo + emojis + segredo ---------- */
function ligarAvatar(av, nome){
  let toques=0;
  av.addEventListener("click", ()=>{
    av.classList.remove("jump"); void av.offsetWidth; av.classList.add("jump");
    tocar("pop");
    soltarBurst(av, 8);
    toques++;
    if(toques % 5 === 0){         // 🤫 segredinho: a cada 5 toques, MEGA festa!
      tocar("festa");
      soltarBurst(av, 18);
      mostrarToast(`🌈 ${nome} é INCRÍVEL! 🌈`);
      confete(["#FF5D8F","#FFB03A","#3FBF7F","#5CC8FF","#9B6BFF"], 90);
    }
  });
}
function soltarBurst(el, qtd){
  const emojis=["⭐","💛","✨","🌟","💖","🎉","🍭","🦄"];
  for(let i=0;i<qtd;i++){
    const p=document.createElement("span");
    p.className="burst";
    p.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    const ang=(Math.PI*2*i)/qtd + Math.random()*.6;
    const dist=60+Math.random()*40;
    p.style.setProperty("--dx",(Math.cos(ang)*dist)+"px");
    p.style.setProperty("--dy",(Math.sin(ang)*dist - 20)+"px");
    p.style.setProperty("--rot",(Math.random()*180-90)+"deg");
    el.appendChild(p);
    setTimeout(()=>p.remove(), 950);
  }
}
function mostrarToast(msg){
  const t=document.createElement("div");
  t.className="toast"; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2700);
}

/* ---------- Frase de ânimo conforme o progresso ---------- */
function fraseAnimo(nome, pct){
  if(pct >= 100) return `🏆 ${nome} é CAMPEÃO! Que orgulho!`;
  if(pct >= 75)  return `🔥 Falta pouquinho, ${nome}! Vai com tudo!`;
  if(pct >= 40)  return `💪 Muito bem, ${nome}! Continue assim!`;
  if(pct > 0)    return `🌱 Boa, ${nome}! Cada estrela conta!`;
  return `🚀 Vamos começar, ${nome}? Você consegue!`;
}

/* ---------- Fileira de mini-estrelas ---------- */
function miniEstrelas(pct){
  const acesas=Math.round((pct/100)*10);
  let html="";
  for(let i=0;i<10;i++){
    html += i<acesas
      ? `<span class="on" style="--i:${i}">⭐</span>`
      : `<span class="off">⭐</span>`;
  }
  return html;
}

/* ---------- Confete ---------- */
function confete(cores, qtd=140){
  if(reduzMovimento) return;
  const cv=document.getElementById("confetti");
  const ctx=cv.getContext("2d");
  cv.width=innerWidth; cv.height=innerHeight;
  const cor=[...cores,"#FFC63D","#5CC8FF","#FF8FAB"];
  const ps=[];
  for(let i=0;i<qtd;i++){
    ps.push({
      x:Math.random()*cv.width, y:-20-Math.random()*cv.height*.5,
      w:6+Math.random()*7, h:10+Math.random()*8,
      vy:2+Math.random()*3, vx:Math.random()*2-1,
      rot:Math.random()*Math.PI, vr:Math.random()*.2-.1,
      c:cor[Math.floor(Math.random()*cor.length)]
    });
  }
  let t=0;
  (function tick(){
    ctx.clearRect(0,0,cv.width,cv.height);
    let vivos=false;
    ps.forEach(p=>{
      p.y+=p.vy; p.x+=p.vx+Math.sin(t/20+p.rot)*0.6; p.rot+=p.vr;
      if(p.y<cv.height+30) vivos=true;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.fillStyle=p.c; ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
      ctx.restore();
    });
    t++;
    if(vivos && t<600) requestAnimationFrame(tick);
    else ctx.clearRect(0,0,cv.width,cv.height);
  })();
}

/* ---------- Renderização ---------- */
function render(){
  document.getElementById("fraseDia").textContent = CONFIG.fraseDoDia;

  const ordenados = [...CONFIG.filhos].sort((a,b)=>b.pontos-a.pontos);
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  const coresVencedores=[];

  ordenados.forEach((f,i)=>{
    const meta = f.meta || CONFIG.metaPadrao;
    const pct = Math.max(0, Math.min(100, (f.pontos/meta)*100));
    const ganhou = f.pontos >= meta;
    const lider = i===0 && f.pontos>0;
    if(ganhou) coresVencedores.push(f.cor);

    const card = document.createElement("div");
    card.className = "card"+(lider?" leader":"");
    card.style.setProperty("--kid", f.cor);
    card.style.setProperty("--delay",(i*.18)+"s");

    const acoesHtml = (f.acoes||[]).slice(0,4).map(a=>{
      const mais = a.pontos>=0;
      return `<div class="acao ${mais?'mais':'menos'}">
        <span>${mais?'💚':'💔'} ${a.texto}</span>
        <span class="pts">${mais?'+':''}${a.pontos} ⭐</span>
      </div>`;
    }).join("") || `<div class="acao"><span style="opacity:.5">Ainda sem registros hoje…</span></div>`;

    // emoji do prêmio (último emoji do texto do prêmio, ou 🎁)
    const premioEmoji = (f.premio.match(/\p{Emoji_Presentation}/gu)||["🎁"]).pop();

    card.innerHTML = `
      ${lider?'<div class="crown">👑</div>':''}
      <div class="rank-badge">${medalhas[i]||""}</div>
      <div class="kid-top">
        <div class="avatar" title="Toque em mim!">${f.emoji}</div>
        <div>
          <div class="nome">${f.nome} <span class="ar nome-ar">${f.nomeArabe}</span></div>
          <div class="idade">${f.idade} anos</div>
        </div>
      </div>
      <div class="pontos">
        <span class="num">${f.pontos}</span>
        <span class="lbl">estrelas ⭐</span>
      </div>
      <div class="mini-stars">${miniEstrelas(pct)}</div>
      <div class="animo">${fraseAnimo(f.nome, pct)}</div>
      <div class="meta">
        <span>Prêmio: ${f.premio}</span>
        <span>${f.pontos} / ${meta}</span>
      </div>
      <div class="bar-wrap">
        <div class="bar">
          <div class="fill" data-pct="${pct}"></div>
          <div class="rocket" data-pct="${pct}">🚀</div>
        </div>
        <div class="finish">🏁${premioEmoji}</div>
      </div>
      ${ganhou?`<div class="premio-ok">🎉 PARABÉNS! Ganhou: ${f.premio} 🎉</div>`:''}
      <div class="acoes">
        <h3>Últimas ações</h3>
        ${acoesHtml}
      </div>`;
    grid.appendChild(card);
    ligarAvatar(card.querySelector(".avatar"), f.nome);
  });

  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    document.querySelectorAll(".fill").forEach(el=>el.style.width=el.dataset.pct+"%");
    document.querySelectorAll(".rocket").forEach(el=>el.style.left=el.dataset.pct+"%");
  }));

  if(coresVencedores.length) setTimeout(()=>confete(coresVencedores), 1200);

  const agora = new Date();
  document.getElementById("rodape").textContent =
    "Atualizado em " + agora.toLocaleDateString("pt-BR") +
    " às " + agora.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}) +
    " · Com amor, Papai e Mamãe 💛";
}

/* Carrega dados.js SEMPRE fresquinho (?t=timestamp fura o cache) */
function carregarDados(){
  const s = document.createElement("script");
  s.src = "dados.js?t=" + Date.now();
  s.onload = ()=> render();
  s.onerror = ()=>{
    document.getElementById("grid").innerHTML =
      `<div class="erro">😢 Não encontrei o arquivo <b>dados.js</b>.<br>
       Ele precisa estar na mesma pasta do index.html.</div>`;
  };
  document.body.appendChild(s);
}

montarCeu();
ligarMascote();
carregarDados();

// 🔄 Tablet na parede: recarrega sozinho a cada 10 minutos
setTimeout(()=>location.reload(), 10*60*1000);
</script>
